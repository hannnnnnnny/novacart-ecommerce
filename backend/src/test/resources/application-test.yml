spring:
  datasource:
    url: jdbc:h2:mem:novacart_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

novacart:
  security:
    jwt-secret: test-secret-value-with-enough-length-for-local-tests
    jwt-expiration-minutes: 120
  cors:
    allowed-origins: http://localhost:5173
