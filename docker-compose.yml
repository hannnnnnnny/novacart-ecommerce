services:
  mysql:
    image: mysql:8.4
    container_name: novacart-mysql
    environment:
      MYSQL_DATABASE: novacart
      MYSQL_USER: novacart_user
      MYSQL_PASSWORD: novacart_password
      MYSQL_ROOT_PASSWORD: novacart_root_password
    ports:
      - "3306:3306"
    volumes:
      - novacart-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: novacart-backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: novacart
      DB_USERNAME: novacart_user
      DB_PASSWORD: novacart_password
      JWT_SECRET: replace-with-a-long-random-secret-for-local-docker-only
      JWT_EXPIRATION_MINUTES: 120
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
    container_name: novacart-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  novacart-mysql-data:
